<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>근무현황</title>
</head>
<body>

<h2>근무현황</h2>

<button onclick="loadSchedule()">조회</button>

<h3>오늘 인원</h3>
<div id="summary"></div>

<h3>비상근무</h3>
<div id="special"></div>

<h3>근무표</h3>
<table border="1">
<thead id="head"></thead>
<tbody id="body"></tbody>
</table>

<h3>근무 추가</h3>
<input id="name" placeholder="이름">
<input id="date" type="date">
<input id="status" placeholder="상태">
<button onclick="addSchedule()">추가</button>

<h3>비상근무 추가</h3>
<input id="s_name" placeholder="이름">
<input id="s_date" type="date">
<input id="s_duty" placeholder="근무종류">
<button onclick="addSpecial()">추가</button>

<h3>근무표 일괄 입력 (엑셀 복붙)</h3>
<textarea id="bulk"></textarea><br>
<button onclick="addBulk()">일괄 추가</button>

<script>

function loadSchedule(){
    fetch("/schedule?month=2026-04")
    .then(r=>r.json())
    .then(data=>{
        document.getElementById("body").innerHTML = JSON.stringify(data);
    });

    fetch("/special?month=2026-04")
    .then(r=>r.json())
    .then(data=>{
        document.getElementById("special").innerHTML = JSON.stringify(data);
    });
}

function addSchedule(){
    fetch("/add_schedule",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:document.getElementById("name").value,
            date:document.getElementById("date").value,
            status:document.getElementById("status").value
        })
    }).then(()=>alert("추가 완료"));
}

function addSpecial(){
    fetch("/add_special",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:document.getElementById("s_name").value,
            date:document.getElementById("s_date").value,
            duty:document.getElementById("s_duty").value
        })
    }).then(()=>alert("추가 완료"));
}

function addBulk(){
    const lines = document.getElementById("bulk").value.split("\n");

    fetch("/add_schedule_bulk",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({data:lines})
    }).then(()=>alert("일괄 완료"));
}

</script>

</body>
</html>
